server {
    server_name logit-xams.nl www.logit-xams.nl;

    # Portal — entry point
    location = / {
        root /root/QuantMini/portal;
        try_files /index.html =404;
    }

    location = /style.css {
        root /root/QuantMini/portal;
    }

    # Minkowski lives here
    location /minkowski/ {
        alias /var/www/minkowski/;
        try_files $uri $uri/ /minkowski/index.html;
    }

    location = /minkowski {
        return 301 /minkowski/;
    }

    # QuantApp — Quantum Mechanics Simulator
    location /quantapp/ {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /quantapp {
        return 301 /quantapp/;
    }

    # QuantMini — Quantum Mechanics mini apps
    location /quantmini/ {
        proxy_pass http://127.0.0.1:8502;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /quantmini {
        return 301 /quantmini/;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/logit-xams.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logit-xams.nl/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
